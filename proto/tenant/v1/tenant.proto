syntax = "proto3";

package tenant.v1;

option go_package = "github.com/Sokol111/ecommerce-tenant-service-api/gen/go/tenant/v1;tenantv1";

import "buf/validate/validate.proto";
import "tenant/v1/types.proto";

// ==================== REQUESTS ====================

message CreateTenantRequest {
  string slug = 1 [(buf.validate.field).string = {min_len: 3, max_len: 63, pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"}];
  string name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
}

message UpdateTenantRequest {
  string slug = 1 [(buf.validate.field).string = {min_len: 3, max_len: 63, pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"}];
  string name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  bool enabled = 3;
  int64 version = 4 [(buf.validate.field).int64.gte = 0];
}

message GetTenantBySlugRequest {
  string slug = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteTenantRequest {
  string slug = 1 [(buf.validate.field).string.min_len = 1];
}

message GetTenantListRequest {
  int32 page = 1 [(buf.validate.field).int32.gte = 1];
  int32 size = 2 [(buf.validate.field).int32 = {gte: 1, lte: 100}];
  optional bool enabled = 3;
  optional string sort = 4;
  optional SortOrder order = 5;
}

message GetEnabledTenantSlugsRequest {}

// ==================== RESPONSES ====================

message CreateTenantResponse {
  Tenant tenant = 1;
}

message UpdateTenantResponse {
  Tenant tenant = 1;
}

message GetTenantBySlugResponse {
  Tenant tenant = 1;
}

message GetTenantListResponse {
  repeated Tenant items = 1;
  int32 page = 2;
  int32 size = 3;
  int64 total = 4;
}

message GetEnabledTenantSlugsResponse {
  repeated string slugs = 1;
}

message DeleteTenantResponse {}

// ==================== SERVICE ====================

service TenantService {
  rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse);
  rpc UpdateTenant(UpdateTenantRequest) returns (UpdateTenantResponse);
  rpc GetTenantBySlug(GetTenantBySlugRequest) returns (GetTenantBySlugResponse);
  rpc DeleteTenant(DeleteTenantRequest) returns (DeleteTenantResponse);
  rpc GetTenantList(GetTenantListRequest) returns (GetTenantListResponse);
  rpc GetEnabledTenantSlugs(GetEnabledTenantSlugsRequest) returns (GetEnabledTenantSlugsResponse);
}
