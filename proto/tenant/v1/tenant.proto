syntax = "proto3";

package tenant.v1;

option go_package = "github.com/Sokol111/ecommerce-tenant-service-api/gen/connect/tenant/v1;tenantv1";

import "google/protobuf/timestamp.proto";

// ==================== ENTITIES ====================

message Tenant {
  string id = 1;
  string slug = 2;
  string name = 3;
  bool enabled = 4;
  int32 version = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp modified_at = 7;
}

// ==================== REQUESTS ====================

message CreateTenantRequest {
  string slug = 1;
  string name = 2;
}

message UpdateTenantRequest {
  string slug = 1;
  string name = 2;
  bool enabled = 3;
  int32 version = 4;
}

message GetTenantBySlugRequest {
  string slug = 1;
}

message DeleteTenantRequest {
  string slug = 1;
}

message GetTenantListRequest {
  int32 page = 1;
  int32 size = 2;
  optional bool enabled = 3;
  optional string sort = 4;
  optional string order = 5;
}

message GetEnabledTenantSlugsRequest {}

message RegisterTenantRequest {
  string slug = 1;
  string name = 2;
  string email = 3;
  string password = 4;
  string first_name = 5;
  string last_name = 6;
}

message GetRegistrationStatusRequest {
  string slug = 1;
}

// ==================== RESPONSES ====================

message CreateTenantResponse {
  Tenant tenant = 1;
}

message UpdateTenantResponse {
  Tenant tenant = 1;
}

message GetTenantBySlugResponse {
  Tenant tenant = 1;
}

message GetTenantListResponse {
  repeated Tenant items = 1;
  int32 page = 2;
  int32 size = 3;
  int64 total = 4;
}

message GetEnabledTenantSlugsResponse {
  repeated string slugs = 1;
}

message DeleteTenantResponse {}

enum RegistrationStatus {
  REGISTRATION_STATUS_UNSPECIFIED = 0;
  REGISTRATION_STATUS_PROVISIONING = 1;
  REGISTRATION_STATUS_COMPLETED = 2;
  REGISTRATION_STATUS_COMPENSATING = 3;
  REGISTRATION_STATUS_ROLLED_BACK = 4;
}

message RegistrationStatusResponse {
  string slug = 1;
  RegistrationStatus status = 2;
  optional string failure_reason = 3;
}

message RegisterTenantResponse {
  oneof result {
    Tenant tenant = 1;
    RegistrationStatusResponse status = 2;
  }
}

message GetRegistrationStatusResponse {
  string slug = 1;
  RegistrationStatus status = 2;
  optional string failure_reason = 3;
}

// ==================== SERVICE ====================

service TenantService {
  rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse);
  rpc UpdateTenant(UpdateTenantRequest) returns (UpdateTenantResponse);
  rpc GetTenantBySlug(GetTenantBySlugRequest) returns (GetTenantBySlugResponse);
  rpc DeleteTenant(DeleteTenantRequest) returns (DeleteTenantResponse);
  rpc GetTenantList(GetTenantListRequest) returns (GetTenantListResponse);
  rpc GetEnabledTenantSlugs(GetEnabledTenantSlugsRequest) returns (GetEnabledTenantSlugsResponse);
  rpc RegisterTenant(RegisterTenantRequest) returns (RegisterTenantResponse);
  rpc GetRegistrationStatus(GetRegistrationStatusRequest) returns (GetRegistrationStatusResponse);
}
