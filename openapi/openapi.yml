openapi: 3.0.3
info:
  title: Tenant Service API
  version: 0.0.7
  description: |
    API for managing tenants.
    
    Handles tenant lifecycle: creation, update, deactivation, activation, and deletion.
    Other services use this API to discover active tenants on startup.

tags:
  - name: Tenants
    description: Tenant management

paths:
  /v1/tenant/create:
    $ref: "./paths/tenants.yml#/paths/~1v1~1tenant~1create"
  /v1/tenant/update:
    $ref: "./paths/tenants.yml#/paths/~1v1~1tenant~1update"
  /v1/tenant/get/{slug}:
    $ref: "./paths/tenants.yml#/paths/~1v1~1tenant~1get~1{slug}"
  /v1/tenant/delete/{slug}:
    $ref: "./paths/tenants.yml#/paths/~1v1~1tenant~1delete~1{slug}"
  /v1/tenant/list:
    $ref: "./paths/tenants.yml#/paths/~1v1~1tenant~1list"
  /v1/tenant/slugs:
    $ref: "./paths/tenants.yml#/paths/~1v1~1tenant~1slugs"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: PASETO token in Authorization header

  schemas:
    Problem:
      $ref: "./schemas/common.yml#/components/schemas/Problem"
    TenantResponse:
      $ref: "./schemas/tenant.yml#/components/schemas/TenantResponse"
    TenantListResponse:
      $ref: "./schemas/tenant.yml#/components/schemas/TenantListResponse"
    TenantSlugListResponse:
      $ref: "./schemas/tenant.yml#/components/schemas/TenantSlugListResponse"
    CreateTenantRequest:
      $ref: "./schemas/tenant.yml#/components/schemas/CreateTenantRequest"
    UpdateTenantRequest:
      $ref: "./schemas/tenant.yml#/components/schemas/UpdateTenantRequest"
